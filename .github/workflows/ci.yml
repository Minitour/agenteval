name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: CLI is importable
        run: |
          agenteval --version
          agenteval --help

      # `validate` checks project structure and never calls a model, capa, or
      # the provider CLI, so it is a safe, hermetic CI smoke test.
      - name: Validate bundled example
        run: agenteval validate --root examples/my-eval

      - name: Scaffold + validate a fresh project
        run: |
          agenteval init /tmp/ci-eval
          agenteval validate --root /tmp/ci-eval

  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build

      - name: Check metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
