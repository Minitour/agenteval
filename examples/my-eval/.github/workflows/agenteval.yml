# Example CI workflow for an agenteval project.
#
# Copy this to the ROOT of your repo at .github/workflows/agenteval.yml
# (GitHub only runs workflows from the repository root, not from nested dirs).
#
# Prerequisites the job installs:
#   - the `capa` binary
#   - the `claude` CLI, authenticated via the ANTHROPIC_API_KEY secret
name: agenteval

on:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agenteval
        run: pip install agenteval-framework

      - name: Install agent prerequisites (capa + claude CLI)
        run: |
          curl -LsSf https://capa.infragate.ai/install.sh | sh
          curl -fsSL https://claude.ai/install.sh | bash
          # both install to ~/.local/bin; put it on PATH for later steps
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run evals
        # claude-cli judge reuses ANTHROPIC_API_KEY; --report-dir keeps artifacts tidy
        run: agenteval run --root examples/my-eval --report-dir reports

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agenteval-reports
          path: reports/

      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: reports/junit.xml
